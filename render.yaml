services:
  - type: web
    name: ocr-excel-converter
    runtime: python
    buildCommand: pip install -r requirements-web.txt
    startCommand: gunicorn web_server:app --bind 0.0.0.0:$PORT --timeout 300
    envVars:
      - key: PORT
        value: 5000
      - key: PYTHON_VERSION
        value: "3.12.0"
